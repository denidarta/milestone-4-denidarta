$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/accounts"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "name": "Savings Account",
        "accountNumber": 1234567890
      }
response:
  statusCode: 201
  statusText: Created
  body:
    type: text
    content: ""
order: 1000
