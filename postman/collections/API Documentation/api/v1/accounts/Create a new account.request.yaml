$kind: http-request
url: "{{baseUrl}}/api/v1/accounts"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Savings Account",
      "accountNumber": 1234567890
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create a new account.resources/examples
order: 4000
