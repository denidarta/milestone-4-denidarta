$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/auth/register"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "john@example.com",
        "password": "Password@123",
        "name": "John Doe"
      }
response:
  statusCode: 201
  statusText: Created
  body:
    type: text
    content: ""
order: 1000
