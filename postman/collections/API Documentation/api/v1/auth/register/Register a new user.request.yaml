$kind: http-request
url: "{{baseUrl}}/api/v1/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "john@example.com",
      "password": "Password@123",
      "name": "John Doe"
    }
examples: ./.resources/Register a new user.resources/examples
order: 1000
