$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/users/admin"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "email": "john@example.com",
        "password": "Password@123",
        "name": "John Doe"
      }
response:
  statusCode: 201
  statusText: Created
  body:
    type: text
    content: ""
order: 1000
