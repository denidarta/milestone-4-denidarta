$kind: http-request
url: "{{baseUrl}}/api/v1/users/admin"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "john@example.com",
      "password": "Password@123",
      "name": "John Doe"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create a new admin user (Admin only).resources/examples
order: 1000
